name = "mimir-api"
main = "src/index.ts"
compatibility_date = "2026-03-29"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "mimir-db"
database_id = "local"  # Will be replaced with real ID after `wrangler d1 create`
migrations_dir = "src/db/migrations"

[[unsafe.bindings]]
name = "RATE_LIMITER_AUTH"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_REGISTER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "mimir-lessons"

[[workflows]]
name = "content-generation"
binding = "CONTENT_WORKFLOW"
class_name = "ContentGenerationWorkflow"

[vars]
PUBLIC_URL = "http://localhost:5173"
